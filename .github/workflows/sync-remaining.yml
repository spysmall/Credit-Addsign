name: Auto Sync Remaining Credit

on:
  schedule:
    # Every Friday 10:00 ICT (UTC+7) = 03:00 UTC
    - cron: "0 3 * * 5"
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browser
        run: npx playwright install --with-deps chromium

      - name: Trigger remaining-credit sync
        run: node scripts/sync-remaining.mjs
